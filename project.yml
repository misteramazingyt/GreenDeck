name: GreenDeck
options:
  bundleIdPrefix: com.greendeck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # <-- set your Apple Developer Team ID in Xcode

targets:
  GreenDeck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GreenDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.greendeck.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "GreenDeck needs camera access to record you over selected backgrounds."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "GreenDeck needs microphone access to record your voice."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "GreenDeck needs permission to save exported videos to your Photos library."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES

schemes:
  GreenDeck:
    build:
      targets:
        GreenDeck: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
