name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ipa:
    name: Build unsigned .ipa (device)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (device, unsigned)
        run: |
          xcodebuild build \
            -project GreenDeck.xcodeproj \
            -scheme GreenDeck \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package .ipa (unsigned)
        run: |
          APP="build/Build/Products/Release-iphoneos/GreenDeck.app"
          if [ ! -d "$APP" ]; then
            echo "::error::Built .app not found at $APP"
            ls -R build/Build/Products || true
            exit 1
          fi
          rm -rf Payload GreenDeck-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry GreenDeck-unsigned.ipa Payload
          echo "Built:" && ls -lh GreenDeck-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenDeck-unsigned-ipa
          path: GreenDeck-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
